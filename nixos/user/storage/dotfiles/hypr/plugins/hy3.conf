plugin {
  hy3 {
    # disable gaps when one window
    no_gaps_when_only = false

    # controls how groups collapse
    # 0 = remove nested group when only 1 window
    # 1 = keep nested group always
    # 2 = keep only if parent is tab group
    node_collapse_policy = 2

    # how far the group inset is
    group_inset = 10

    # if true, first spawned window becomes a tab group
    tab_first_window = false

    tabs {
      height = 18
      padding = 6
      from_top = false      
      radius = 6
      border_width = 1     

      render_text = true
      text_center = true
      text_font = "Sans"
      text_height = 8
      text_padding = 3

      col.active = rgba(2a2f33cc)            
      col.active.border = rgba(3a4046ff)    
      col.active.text = rgba(d0d0d0ff)      

      col.active_alt_monitor = rgba(262a2ecc)
      col.active_alt_monitor.border = rgba(353a40ff)

      col.inactive = rgba(1e2124aa)
      col.inactive.border = rgba(2a2f33aa)
      col.inactive.text = rgba(8a8f94ff)     
    }
  }
}
