plugin {
  hy3 {
    no_gaps_when_only = false
    node_collapse_policy = 2
    group_inset = 10
    tab_first_window = false

    tabs {
      height = 16
      padding = 6
      from_top = false
      radius = 6
      border_width = 1         

      render_text = true
      text_center = true
      text_font = "Sans"
      text_height = 8
      text_padding = 3

      col.active = rgba(2f353acc)
      col.active.border = rgba(5a6b78ff)
      col.active.text = rgba(e6e6e6ff)

      col.active_alt_monitor = rgba(2a2f33cc)
      col.active_alt_monitor.border = rgba(454c52ff)

      col.inactive = rgba(1c1f22aa)
      col.inactive.border = rgba(2a2f3388)
      col.inactive.text = rgba(9aa0a6ff)
    }
  }
}
