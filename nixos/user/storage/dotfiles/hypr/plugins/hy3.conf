plugin {
  hy3 {
    # disable gaps when one window
    no_gaps_when_only = false

    # controls how groups collapse
    # 0 = remove nested group when only 1 window
    # 1 = keep nested group always
    # 2 = keep only if parent is tab group
    node_collapse_policy = 2

    # how far the group inset is
    group_inset = 10

    # if true, first spawned window becomes a tab group
    tab_first_window = false

    tabs {
      height = 22
      padding = 6
      from_top = false
      radius = 6
      border_width = 2

      render_text = true
      text_center = true
      text_font = "Sans"
      text_height = 8
      text_padding = 3

      col.active = rgba(33ccff40)
      col.active.border = rgba(33ccffee)
      col.active.text = rgba(ffffffff)

      col.active_alt_monitor = rgba(60606040)
      col.active_alt_monitor.border = rgba(808080ee)

      col.inactive = rgba(20202040)
      col.inactive.border = rgba(606060ff)
      col.inactive.text = rgba(808080ee)
    }
  }
}
